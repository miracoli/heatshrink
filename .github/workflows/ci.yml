name: CI

on:
  push:
    branches: [ develop, main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: make ci DISABLE_FUZZ=1

  build-32:
    runs-on: ubuntu-latest
    env:
      CC: gcc
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib libc6-dev-i386
      - name: Build and test (32-bit)
        run: |
          make clean
          make ci DISABLE_FUZZ=1 EXTRA_CFLAGS="-m32" EXTRA_LDFLAGS="-m32"

  cross-compile:
    runs-on: ubuntu-latest
    env:
      AVR_CC: avr-gcc
    steps:
      - uses: actions/checkout@v4
      - name: Install AVR and MSP430 toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-avr binutils-avr avr-libc \
            python3-pip

          python3 -m pip install --user platformio
          "$HOME/.local/bin/pio" pkg install --global --tool toolchain-timsp430

          msp430_cc="$HOME/.platformio/packages/toolchain-timsp430/bin/msp430-gcc"
          if [ ! -x "$msp430_cc" ]; then
            echo "Unable to locate msp430-gcc after PlatformIO installation" >&2
            exit 1
          fi

          echo "MSP430_CC=$msp430_cc" >> "$GITHUB_ENV"
      - name: Build AVR/MSP430 cross-compilation objects
        run: |
          make clean
          make cross DISABLE_FUZZ=1 AVR_CC="$AVR_CC" MSP430_CC="$MSP430_CC"

  avr-cycle:
    runs-on: ubuntu-latest
    env:
      AVR_CC: avr-gcc
      SIMAVR: simavr
      SIMAVR_INCLUDE: /usr/include/simavr
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain and simavr
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-avr binutils-avr avr-libc \
            simavr libsimavr-dev

      - name: Run AVR cycle test under simavr
        run: |
          make clean
          make avr-cycle AVR_CC="$AVR_CC" SIMAVR="$SIMAVR" SIMAVR_INCLUDE="$SIMAVR_INCLUDE"

      - name: Add AVR cycle metrics to summary
        if: always()
        run: |
          echo "### AVR cycle metrics" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [ -f avr_cycle_metrics.txt ]; then
            {
              echo "| Metric | Value |"
              echo "|---|---:|"
              while IFS='=' read -r key value; do
                printf '| `%s` | `%s` |\n' "$key" "$value"
              done < avr_cycle_metrics.txt
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No metrics file produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload AVR cycle metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: avr-cycle-metrics
          path: avr_cycle_metrics.txt
          if-no-files-found: ignore

