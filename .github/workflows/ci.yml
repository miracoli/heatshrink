name: CI

on:
  push:
    branches: [ develop, main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: make ci DISABLE_FUZZ=1

  build-32:
    runs-on: ubuntu-latest
    env:
      CC: gcc
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib libc6-dev-i386
      - name: Build and test (32-bit)
        run: |
          make clean
          make ci DISABLE_FUZZ=1 EXTRA_CFLAGS="-m32" EXTRA_LDFLAGS="-m32"
